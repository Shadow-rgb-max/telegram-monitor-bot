services:
  tg-keyword-monitor:
    build: .
    container_name: tg-keyword-monitor
    restart: unless-stopped
    volumes:
      - ./config.ini:/app/config.ini
      - ./config.key:/app/config.key
      - ./bot_session.session:/app/bot_session.session
      - ./bot_session.session-journal:/app/bot_session.session-journal
      - ./edit_config_session.session:/app/edit_config_session.session
      - ./edit_config_session.session-journal:/app/edit_config_session.session-journal
      - ./channel_cache.json:/app/channel_cache.json
      - ./bot.log:/app/bot.log
    environment:
      - PYTHONUNBUFFERED=1
      # Прокси-настройки (опционально)
      # - USE_PROXY_POOL=true
      # - TELEGRAM_PROXY=socks5://user:pass@host:port
      # - PROXY_POOL_SIZE=10
      # - PROXY_REFRESH_INTERVAL=300
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"